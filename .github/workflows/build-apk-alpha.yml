name: Build Compose APK (Alpha)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Clean
        run: ./gradlew clean

      - name: Assemble alphaRelease
        run: ./gradlew :app:assembleAlphaRelease --stacktrace --info

       # 👇 下面这段是我给你加的：上传APK，让编译产物可下载
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-alpha-release
          path: app/build/outputs/apk/alpha/release/*.apk
